name: kubernetes-lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'kubernetes/manifests/**'

jobs:
  kubeval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Kubeval
        uses: instrumenta/kubeval-action@master
        with:
          files: kubernetes/manifests/
