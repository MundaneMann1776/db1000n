name: Test

on:
  push:
    branches:
      - "main"
  pull_request:
    paths:
      - "src/**"
      - "main.go"
      - "go.mod"
      - "go.sum"

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.25"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
